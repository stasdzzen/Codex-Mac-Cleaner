name: Ошибка
description: Сообщить о воспроизводимой ошибке Codex Mac Cleaner
title: "[ОШИБКА] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Не публикуйте секреты, реальные полные пути и сведения об уязвимостях. Об уязвимости сообщите через закрытую форму GitHub.
  - type: input
    id: version
    attributes:
      label: Коммит или версия
      description: Точный номер коммита или версия установленного плагина
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Среда
      description: Версии macOS и Codex, модель Mac и архитектура
    validations:
      required: true
  - type: input
    id: profile
    attributes:
      label: Профиль
      description: Например, проверка остатков удалённых приложений (`application_remnants`)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Короткая последовательность действий и искусственные тестовые данные без секретов и реальных путей
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемый результат
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактический результат
    validations:
      required: true
  - type: textarea
    id: safe_evidence
    attributes:
      label: Безопасное доказательство
      description: Только относящийся к ошибке фрагмент без содержимого файлов, ключей доступа, списка приложений и полного списка настроек среды
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Проверка приватности
      options:
        - label: Я удалил секреты, реальные полные пути и персональные данные.
          required: true
        - label: Это не закрытый отчёт об уязвимости.
          required: true
