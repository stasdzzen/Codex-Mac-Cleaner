name: CMC-10 — release evidence без публикации

on:
  pull_request:
    paths:
      - ".codex-plugin/**"
      - ".mcp.json"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "docs/release/third-party-notices.json"
      - "skills/**"
      - "tests/plugin/**"
      - "tests/security/**"
      - "README.md"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-only:
    name: Deterministic package, SBOM и provenance
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Получить исходники
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Установить Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
      - name: Установить зависимости
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Собрать дважды и проверить evidence
        run: node scripts/package-release.mjs --verify-only
      - name: Проверить публичную package boundary
        run: pnpm exec vitest run tests/security/supply-chain.test.ts tests/plugin
